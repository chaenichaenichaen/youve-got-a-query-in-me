<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Query Sheet — Minimal SQL UI Mockup</title>
  <style>
    :root {
      --lemon: #F6FA00;
      --yellow: #FADB00;
      --orange: #FAA000;
      --white: #ffffff;
      --ink: #171717;
      --muted: rgba(23, 23, 23, 0.58);
      --line: rgba(23, 23, 23, 0.12);
      --line-strong: rgba(23, 23, 23, 0.2);
      --soft: rgba(250, 219, 0, 0.14);
      --shadow: 0 18px 48px rgba(23, 23, 23, 0.08);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --max: 860px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background: var(--white);
      overflow: hidden;
    }

    button, textarea, input { font: inherit; }
    button { cursor: pointer; }

    .app {
      min-height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      position: relative;
      background: var(--white);
    }

    header {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 26px;
      position: relative;
      z-index: 5;
      background: var(--white);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 650;
      letter-spacing: -0.04em;
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: var(--yellow);
      color: var(--ink);
      border: 1px solid var(--orange);
      font-weight: 700;
    }

    .source-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      background: var(--white);
      border-radius: 999px;
      padding: 9px 13px;
      color: var(--muted);
      transition: 0.2s ease;
      max-width: 46vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .source-pill:hover {
      border-color: var(--orange);
      color: var(--ink);
      background: var(--soft);
    }

    .source-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--yellow);
      flex: 0 0 auto;
    }

    .source-dot.ready {
      background: var(--orange);
      box-shadow: 0 0 0 5px rgba(250, 160, 0, 0.15);
    }

    .ghost-btn {
      border: 1px solid var(--line);
      background: var(--white);
      color: var(--muted);
      border-radius: 999px;
      padding: 9px 13px;
      transition: 0.2s ease;
    }

    .ghost-btn:hover {
      border-color: var(--orange);
      color: var(--ink);
      background: var(--soft);
    }

    main {
      width: min(var(--max), calc(100vw - 34px));
      margin: 0 auto;
      min-height: 0;
      position: relative;
    }

    .landing {
      height: calc(100vh - 190px);
      display: grid;
      place-items: center;
      text-align: center;
      transition: 0.35s ease;
    }

    body.has-results .landing {
      height: 0;
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .hero {
      transform: translateY(-5vh);
      width: min(680px, 100%);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      border: 1px solid var(--yellow);
      border-radius: 999px;
      background: rgba(246, 250, 0, 0.2);
      color: var(--ink);
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4.6vw, 50px);
      font-weight: 520;
      line-height: 1.12;
      letter-spacing: -0.055em;
    }

    .hero p {
      margin: 18px auto 0;
      color: var(--muted);
      font-size: clamp(14px, 1.55vw, 16px);
      line-height: 1.65;
      max-width: 520px;
      letter-spacing: -0.025em;
      font-weight: 400;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 9px;
      margin-top: 26px;
    }

    .suggestions button {
      border: 1px solid var(--yellow);
      background: var(--white);
      color: var(--ink);
      border-radius: 999px;
      padding: 10px 13px;
      transition: 0.2s ease;
      font-size: 13px;
    }

    .suggestions button:hover {
      transform: translateY(-1px);
      background: var(--lemon);
      border-color: var(--orange);
    }

    .conversation {
      height: calc(100vh - 190px);
      overflow-y: auto;
      padding: 18px 0 28px;
      scroll-behavior: smooth;
    }

    .conversation:empty { display: none; }

    .turn {
      display: grid;
      gap: 12px;
      margin: 16px 0 24px;
      animation: rise 0.28s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bubble {
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .bubble.user {
      justify-self: end;
      max-width: 78%;
      background: var(--yellow);
      color: var(--ink);
      border-color: var(--orange);
      padding: 15px 17px;
      white-space: pre-wrap;
      line-height: 1.5;
      letter-spacing: -0.02em;
    }

    .bubble.result {
      background: var(--white);
      padding: 18px;
    }

    .result-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .result-title {
      display: grid;
      gap: 3px;
    }

    .result-title strong {
      letter-spacing: -0.04em;
      font-weight: 650;
    }

    .result-title span {
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      border: 1px solid var(--orange);
      color: var(--ink);
      background: var(--lemon);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      white-space: nowrap;
    }

    .mini-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--white);
    }

    .mini-table th, .mini-table td {
      padding: 12px 13px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      white-space: nowrap;
    }

    .mini-table th {
      color: var(--ink);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: rgba(250, 219, 0, 0.24);
      font-weight: 650;
    }

    .mini-table tr:last-child td { border-bottom: 0; }

    .explain {
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.58;
    }

    .composer-zone {
      width: min(var(--max), calc(100vw - 34px));
      margin: 0 auto 18px;
      position: relative;
      z-index: 10;
    }

    .composer {
      display: grid;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line-strong);
      background: var(--white);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }

    .context-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 2px 4px 0;
      min-height: 28px;
    }

    .context-left {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .chip {
      border: 1px solid var(--yellow);
      background: rgba(246, 250, 0, 0.16);
      color: var(--ink);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 260px;
    }

    .link-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 6px 8px;
      border-radius: 999px;
      font-size: 12px;
    }

    .link-btn:hover {
      color: var(--ink);
      background: var(--soft);
    }

    .input-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .round-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--yellow);
      background: var(--white);
      display: grid;
      place-items: center;
      color: var(--ink);
      transition: 0.2s ease;
      flex: 0 0 auto;
    }

    .round-btn:hover {
      transform: translateY(-1px);
      border-color: var(--orange);
      background: var(--lemon);
    }

    .run-btn {
      background: var(--orange);
      color: var(--ink);
      border-color: var(--orange);
      font-weight: 700;
    }

    .run-btn:hover {
      background: var(--yellow);
      border-color: var(--orange);
    }

    textarea {
      width: 100%;
      min-height: 42px;
      max-height: 164px;
      resize: none;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      padding: 10px 2px;
      line-height: 1.55;
      letter-spacing: -0.02em;
    }

    textarea::placeholder { color: rgba(23, 23, 23, 0.42); }

    .hidden { display: none; }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(23, 23, 23, 0.16);
      opacity: 0;
      pointer-events: none;
      transition: 0.2s ease;
      z-index: 20;
    }

    .drawer {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translate(-50%, 18px) scale(0.98);
      width: min(620px, calc(100vw - 28px));
      border-radius: 28px;
      border: 1px solid var(--line-strong);
      background: var(--white);
      box-shadow: 0 30px 90px rgba(23, 23, 23, 0.18);
      padding: 18px;
      opacity: 0;
      pointer-events: none;
      transition: 0.22s ease;
      z-index: 21;
    }

    body.drawer-open .drawer-backdrop { opacity: 1; pointer-events: auto; }
    body.drawer-open .drawer { opacity: 1; pointer-events: auto; transform: translate(-50%, 0) scale(1); }

    .drawer h2 {
      margin: 2px 0 6px;
      font-size: 20px;
      letter-spacing: -0.05em;
      font-weight: 620;
    }

    .drawer p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .upload-card {
      border: 1px dashed var(--orange);
      background: rgba(246, 250, 0, 0.16);
      border-radius: 22px;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .upload-card strong {
      display: block;
      letter-spacing: -0.03em;
      font-weight: 620;
    }

    .upload-card span {
      color: var(--muted);
      font-size: 13px;
    }

    .primary-btn {
      border: 1px solid var(--orange);
      border-radius: 999px;
      background: var(--orange);
      color: var(--ink);
      padding: 11px 15px;
      white-space: nowrap;
      font-weight: 650;
    }

    .primary-btn:hover { background: var(--yellow); }

    .sheet-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
    }

    .sheet-list button {
      border: 1px solid var(--line);
      background: var(--white);
      border-radius: 16px;
      padding: 12px;
      text-align: left;
      transition: 0.2s ease;
      color: var(--ink);
    }

    .sheet-list button:hover,
    .sheet-list button.active {
      border-color: var(--orange);
      background: rgba(250, 219, 0, 0.22);
      box-shadow: 0 10px 30px rgba(250, 160, 0, 0.11);
    }

    .sheet-list small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      header { padding: 0 16px; }
      .brand span { display: none; }
      .source-pill { max-width: 62vw; }
      .bubble.user { max-width: 92%; }
      .sheet-list { grid-template-columns: 1fr; }
      .mini-table { display: block; overflow-x: auto; }
      .hero { transform: translateY(-3vh); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand" aria-label="서비스명">
        <div class="logo">Q</div>
        <span>Query Sheet</span>
      </div>

      <button class="source-pill" id="sourceButton" type="button" aria-label="데이터 소스 선택">
        <span class="source-dot" id="sourceDot"></span>
        <span id="sourceLabel">엑셀 테이블 선택</span>
      </button>

      <button class="ghost-btn" id="resetButton" type="button">새 쿼리</button>
    </header>

    <main>
      <section class="landing" id="landing">
        <div class="hero">
          <div class="eyebrow">로컬 엑셀을 SQL처럼 다루는 미니 GUI</div>
          <h1>엑셀을 고르고,<br />SQL로 말해보세요.</h1>
          <p>복잡한 메뉴 대신 검색창 하나로 테이블 조회, 수정, 필터링 흐름을 설계한 목업입니다.</p>
          <div class="suggestions" aria-label="샘플 SQL">
            <button type="button" data-query="SELECT * FROM Sheet1 LIMIT 10;">상위 10개 행 보기</button>
            <button type="button" data-query="UPDATE Sheet1 SET status = '확인완료' WHERE amount >= 1000000;">조건에 맞는 값 수정</button>
            <button type="button" data-query="SELECT department, SUM(amount) AS total FROM Sheet1 GROUP BY department;">부서별 합계 보기</button>
          </div>
        </div>
      </section>

      <section class="conversation" id="conversation" aria-live="polite"></section>
    </main>

    <section class="composer-zone" aria-label="SQL 입력 영역">
      <form class="composer" id="queryForm">
        <div class="context-row">
          <div class="context-left">
            <span class="chip" id="fileChip">파일 없음</span>
            <span class="chip" id="sheetChip">Sheet1</span>
          </div>
          <button class="link-btn" type="button" id="sampleButton">샘플 입력</button>
        </div>

        <div class="input-row">
          <button class="round-btn" id="attachButton" type="button" title="엑셀 파일 선택">＋</button>
          <textarea id="queryInput" rows="1" placeholder="SQL 구문을 입력하세요. 예: SELECT * FROM Sheet1 WHERE amount > 100000;"></textarea>
          <button class="round-btn run-btn" type="submit" title="쿼리 실행">↵</button>
        </div>
      </form>
    </section>
  </div>

  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="drawer" id="drawer" aria-label="데이터 소스 설정">
    <h2>데이터 소스</h2>
    <p>목업 단계에서는 실제 파일을 읽지 않고, 선택한 파일명과 시트만 인터페이스에 반영합니다.</p>

    <div class="upload-card">
      <div>
        <strong id="uploadTitle">엑셀 파일을 선택하세요</strong>
        <span>.xlsx, .xls, .csv 등 로컬 파일 연결 예정</span>
      </div>
      <button class="primary-btn" id="chooseFileButton" type="button">파일 선택</button>
      <input class="hidden" id="fileInput" type="file" accept=".xlsx,.xls,.csv" />
    </div>

    <div class="sheet-list" id="sheetList">
      <button type="button" class="active" data-sheet="Sheet1">Sheet1<small>기본 테이블</small></button>
      <button type="button" data-sheet="Transactions">Transactions<small>거래내역</small></button>
      <button type="button" data-sheet="Master">Master<small>기준정보</small></button>
    </div>
  </aside>

  <script>
    const body = document.body;
    const sourceButton = document.getElementById('sourceButton');
    const sourceLabel = document.getElementById('sourceLabel');
    const sourceDot = document.getElementById('sourceDot');
    const drawerBackdrop = document.getElementById('drawerBackdrop');
    const chooseFileButton = document.getElementById('chooseFileButton');
    const attachButton = document.getElementById('attachButton');
    const fileInput = document.getElementById('fileInput');
    const uploadTitle = document.getElementById('uploadTitle');
    const fileChip = document.getElementById('fileChip');
    const sheetChip = document.getElementById('sheetChip');
    const sheetList = document.getElementById('sheetList');
    const queryForm = document.getElementById('queryForm');
    const queryInput = document.getElementById('queryInput');
    const conversation = document.getElementById('conversation');
    const sampleButton = document.getElementById('sampleButton');
    const resetButton = document.getElementById('resetButton');

    const state = {
      fileName: '',
      sheetName: 'Sheet1',
      runs: 0
    };

    const samples = [
      "SELECT * FROM Sheet1 LIMIT 10;",
      "UPDATE Sheet1 SET status = '확인완료' WHERE amount >= 1000000;",
      "SELECT department, SUM(amount) AS total FROM Sheet1 GROUP BY department;",
      "DELETE FROM Sheet1 WHERE status = '중복';"
    ];

    function openDrawer() { body.classList.add('drawer-open'); }
    function closeDrawer() { body.classList.remove('drawer-open'); }

    function syncSourceUI() {
      const label = state.fileName ? `${state.fileName} · ${state.sheetName}` : '엑셀 테이블 선택';
      sourceLabel.textContent = label;
      fileChip.textContent = state.fileName || '파일 없음';
      sheetChip.textContent = state.sheetName;
      uploadTitle.textContent = state.fileName || '엑셀 파일을 선택하세요';
      sourceDot.classList.toggle('ready', Boolean(state.fileName));
    }

    function autoGrow() {
      queryInput.style.height = 'auto';
      queryInput.style.height = Math.min(queryInput.scrollHeight, 164) + 'px';
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function getMockType(sql) {
      const trimmed = sql.trim().toLowerCase();
      if (trimmed.startsWith('update')) return 'update';
      if (trimmed.startsWith('delete')) return 'delete';
      if (trimmed.startsWith('insert')) return 'insert';
      return 'select';
    }

    function renderResult(sql) {
      const type = getMockType(sql);
      const sourceText = state.fileName ? `${state.fileName} / ${state.sheetName}` : `샘플 데이터 / ${state.sheetName}`;

      if (type === 'select') {
        return `
          <div class="result-head">
            <div class="result-title">
              <strong>조회 결과 미리보기</strong>
              <span>${escapeHtml(sourceText)}에서 5개 행을 가져온 목업 결과입니다.</span>
            </div>
            <span class="status">ready</span>
          </div>
          <table class="mini-table" aria-label="조회 결과">
            <thead>
              <tr><th>id</th><th>department</th><th>amount</th><th>status</th></tr>
            </thead>
            <tbody>
              <tr><td>1001</td><td>Finance</td><td>1,240,000</td><td>확인완료</td></tr>
              <tr><td>1002</td><td>Sales</td><td>830,000</td><td>검토중</td></tr>
              <tr><td>1003</td><td>HR</td><td>210,000</td><td>대기</td></tr>
              <tr><td>1004</td><td>Finance</td><td>3,450,000</td><td>확인완료</td></tr>
              <tr><td>1005</td><td>Ops</td><td>690,000</td><td>검토중</td></tr>
            </tbody>
          </table>
          <div class="explain">실제 구현 단계에서는 이 영역에 SQL 실행 결과, 영향받은 행 수, 변경 전후 diff를 표시하면 됩니다.</div>
        `;
      }

      const copy = {
        update: ['수정 쿼리 감지', '조건에 맞는 12개 행이 수정될 예정입니다. 실행 전 변경 전후 비교 화면을 연결할 수 있습니다.'],
        delete: ['삭제 쿼리 감지', '조건에 맞는 3개 행이 삭제 후보로 감지되었습니다. 실제 구현 시 즉시 삭제보다 확인 단계를 두는 구성이 안전합니다.'],
        insert: ['추가 쿼리 감지', '새로운 행 1건이 추가될 예정입니다. 필수 컬럼 누락 여부 검증 UI를 붙이기 좋습니다.']
      }[type];

      return `
        <div class="result-head">
          <div class="result-title">
            <strong>${copy[0]}</strong>
            <span>${escapeHtml(sourceText)}</span>
          </div>
          <span class="status">preview</span>
        </div>
        <div class="explain">${copy[1]}</div>
      `;
    }

    function submitQuery(sql) {
      const query = sql.trim();
      if (!query) return;

      state.runs += 1;
      body.classList.add('has-results');

      const turn = document.createElement('article');
      turn.className = 'turn';
      turn.innerHTML = `
        <div class="bubble user">${escapeHtml(query)}</div>
        <div class="bubble result">${renderResult(query)}</div>
      `;
      conversation.appendChild(turn);
      queryInput.value = '';
      autoGrow();
      requestAnimationFrame(() => conversation.scrollTop = conversation.scrollHeight);
    }

    sourceButton.addEventListener('click', openDrawer);
    attachButton.addEventListener('click', openDrawer);
    drawerBackdrop.addEventListener('click', closeDrawer);
    chooseFileButton.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (!file) return;
      state.fileName = file.name;
      syncSourceUI();
      closeDrawer();
    });

    sheetList.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-sheet]');
      if (!button) return;
      state.sheetName = button.dataset.sheet;
      [...sheetList.querySelectorAll('button')].forEach(btn => btn.classList.toggle('active', btn === button));
      syncSourceUI();
      queryInput.placeholder = `SQL 구문을 입력하세요. 예: SELECT * FROM ${state.sheetName} LIMIT 10;`;
      closeDrawer();
    });

    queryInput.addEventListener('input', autoGrow);
    queryInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        queryForm.requestSubmit();
      }
    });

    queryForm.addEventListener('submit', (event) => {
      event.preventDefault();
      submitQuery(queryInput.value);
    });

    sampleButton.addEventListener('click', () => {
      const sql = samples[state.runs % samples.length].replaceAll('Sheet1', state.sheetName);
      queryInput.value = sql;
      autoGrow();
      queryInput.focus();
    });

    resetButton.addEventListener('click', () => {
      conversation.innerHTML = '';
      state.runs = 0;
      body.classList.remove('has-results');
      queryInput.focus();
    });

    document.querySelectorAll('[data-query]').forEach(button => {
      button.addEventListener('click', () => {
        const sql = button.dataset.query.replaceAll('Sheet1', state.sheetName);
        queryInput.value = sql;
        autoGrow();
        queryInput.focus();
      });
    });

    syncSourceUI();
  </script>
</body>
</html>
